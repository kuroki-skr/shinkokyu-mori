<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深呼吸をする森</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Noto+Sans+JP:wght@300&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }

    body {
      background: #0b120c;
      font-family: 'Shippori Mincho', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 背景グラデーション */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(25,50,28,.8) 0%, transparent 60%),
        radial-gradient(ellipse at 75% 20%, rgba(15,28,17,.9) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 85%, rgba(8,14,9,1) 0%, transparent 55%);
      z-index: 0;
    }

    /* ================================================
       上部固定
    ================================================ */
    .top-fixed {
      position: fixed;
      top: 36px;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      padding: 0 48px;
    }

    /* ================================================
       中央：言葉だけ
    ================================================ */
    .center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      max-width: 680px;
      padding: 0 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    /* ================================================
       上部ライン
    ================================================ */
    .line-top {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,148,74,.5), transparent);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadein 1.2s .3s forwards;
    }

    /* ================================================
       サイトタイトル
    ================================================ */
    .site-title {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: .55em;
      color: rgba(90,140,100,.65);
      margin-bottom: 52px;
      opacity: 0;
      animation: fadein 1s .5s forwards;
    }

    /* ================================================
       日付
    ================================================ */
    .date {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(14px, 2vw, 14px);
      letter-spacing: .12em;
      color: #6a9e78;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadein 1s .8s forwards;
    }

    /* ================================================
       言葉
    ================================================ */
    .word {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(18px, 2.8vw, 20px);
      line-height: 2.4;
      letter-spacing: .08em;
      color: #dce8de;
      text-align: center;
      opacity: 0;
      animation: fadein 1.2s 1.1s forwards;
    }

    /* ================================================
       下部ライン
    ================================================ */
    .line-bottom {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,148,74,.5), transparent);
      margin-top: 52px;
      opacity: 0;
      animation: fadein 1.2s .3s forwards;
    }

    /* ================================================
       ナビ（前／次）— 画面下部固定
    ================================================ */
    .nav {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      opacity: 0;
      animation: fadein 1s 1.4s forwards;
      z-index: 10;
    }

    .nav-btn {
      padding: 10px 32px;
      background: rgba(9,18,12,.7);
      border: 1px solid rgba(61,107,74,.28);
      border-radius: 1px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .35em;
      color: rgba(106,158,120,.7);
      cursor: pointer;
      transition: all .3s;
      backdrop-filter: blur(8px);
    }
    .nav-btn:hover {
      border-color: rgba(61,107,74,.55);
      color: #a8c9b0;
      background: rgba(61,107,74,.1);
    }

    /* ローディング */
    .loading {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: .4em;
      color: rgba(61,107,74,.6);
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100%{ opacity:.4; } 50%{ opacity:1; }
    }

    /* 画像保存ボタン */
    .dl-btn {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: transparent;
      border: none;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: .35em;
      color: rgba(61,107,74,.45);
      cursor: pointer;
      transition: color .3s;
      white-space: nowrap;
      padding: 6px 12px;
      opacity: 0;
      animation: fadein 1s 1.6s forwards;
    }
    .dl-btn:hover { color: rgba(106,158,120,.8); }

    #img-canvas { display:none; }

    @keyframes fadein { to { opacity:1; } }
    @keyframes appear {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .appear { animation: appear .6s ease forwards; }
  </style>
</head>
<body>

<!-- 上部固定 -->
<div class="top-fixed">
  <p class="site-title">深呼吸をする森</p>
  <div class="line-top"></div>
</div>

<!-- 中央：言葉 -->
<div class="center">
  <p class="date" id="date-el">読み込み中…</p>
  <p class="word" id="word-el">
    <span class="loading">🌲</span>
  </p>
</div>

<!-- 下部固定：ナビ -->
<div class="nav" id="nav" style="display:none;">
  <button class="nav-btn" onclick="prevWord()">← 前</button>
  <button class="nav-btn" onclick="nextWord()">次 →</button>
</div>

<!-- 画像保存 -->
<button class="dl-btn" id="dl-btn" style="display:none;" onclick="downloadImage()">画像として保存</button>
<canvas id="img-canvas"></canvas>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz705lvtEDwpgb9sH1gjLbO9_trSu8XfmcGn5TdWuxpZ7kgKsRF17S6k42YlyKO8CjylQ/exec';
  const SAMPLE  = ['橘川さんの言葉１','橘川さんの言葉２','橘川さんの言葉３'];

  let allWords = [];
  let currentIndex = 0;

  async function fetchWords() {
    if (!GAS_URL) return { allWords: SAMPLE, total: SAMPLE.length };
    try {
      const res  = await fetch(GAS_URL);
      const data = await res.json();
      return { allWords: data.allWords || data.words, total: data.total };
    } catch(e) {
      return { allWords: SAMPLE, total: SAMPLE.length };
    }
  }

  function getTodayIndex(total) {
    const d = new Date();
    const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
    return seed % total;
  }

  function renderWord(index) {
    const word = allWords[index];
    const el = document.getElementById('word-el');
    el.className = 'word';
    const escaped = word.replace(/\n/g, '<br>');
    el.innerHTML = `<span class="appear">${escaped}</span>`;
    document.getElementById('nav').style.display = 'flex';
    document.getElementById('dl-btn').style.display = 'block';
  }

  function prevWord() {
    currentIndex = (currentIndex - 1 + allWords.length) % allWords.length;
    renderWord(currentIndex);
  }

  function nextWord() {
    currentIndex = (currentIndex + 1) % allWords.length;
    renderWord(currentIndex);
  }

  // デバイス判定して画像生成
  function downloadImage() {
    const isMobile = /iPhone|Android|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;
    const W = isMobile ? 1080 : 1920;
    const H = isMobile ? 1920 : 1080;

    const word = allWords[currentIndex];
    const now  = new Date();
    const dateStr = `${now.getMonth()+1}月${now.getDate()}日`;

    const canvas = document.getElementById('img-canvas');
    canvas.width  = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    // 背景
    const bg = ctx.createRadialGradient(W*.25, H*.4, 0, W*.25, H*.4, W*.9);
    bg.addColorStop(0, '#1a2e1c');
    bg.addColorStop(.5, '#111a12');
    bg.addColorStop(1, '#090f0a');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // ゴールドライン（上）
    const lineY1 = H * (isMobile ? 0.14 : 0.16);
    const lineY2 = H * (isMobile ? 0.86 : 0.84);
    const grad = ctx.createLinearGradient(0, 0, W, 0);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(.5, '#b8944a');
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(W*.12, lineY1); ctx.lineTo(W*.88, lineY1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W*.12, lineY2); ctx.lineTo(W*.88, lineY2); ctx.stroke();

    // サイトタイトル
    ctx.fillStyle = 'rgba(61,107,74,.65)';
    ctx.font = `300 ${W * (isMobile ? .026 : .018)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('深呼吸をする森', W/2, H * (isMobile ? .105 : .12));

    // 言葉（改行対応）
    ctx.fillStyle = '#dce8de';
    const fSize = W * (isMobile ? .032 : .016);
    ctx.font = `400 ${fSize}px serif`;
    const lineH = fSize * 2.6;
    const rawLines = word.split(/\n/);
    const lines = [];
    const maxW = W * .60;
    rawLines.forEach(raw => {
      if (ctx.measureText(raw).width <= maxW) { lines.push(raw); return; }
      let cur = '';
      for (const ch of raw) {
        if (ctx.measureText(cur+ch).width > maxW) { if(cur) lines.push(cur); cur=ch; }
        else cur += ch;
      }
      if (cur) lines.push(cur);
    });
    const totalH = lines.length * lineH;
    const startY = H/2 - totalH/2 + fSize * .5;
    lines.forEach((line, i) => ctx.fillText(line, W/2, startY + i * lineH));

    // ダウンロード
    const link = document.createElement('a');
    link.download = `shinkokyuu_${now.getMonth()+1}${now.getDate()}_${isMobile?'sp':'pc'}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  async function init() {
    const now = new Date();
    document.getElementById('date-el').textContent =
      `${now.getMonth()+1}月${now.getDate()}日`;

    const data   = await fetchWords();
    allWords     = data.allWords;
    currentIndex = getTodayIndex(allWords.length);
    renderWord(currentIndex);
  }

  init();
</script>
</body>
</html>
