<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深呼吸をする森</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Noto+Sans+JP:wght@300&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }

    body {
      background: #0b120c;
      font-family: 'Shippori Mincho', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 背景グラデーション */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 30% 40%, rgba(25,50,28,.8) 0%, transparent 60%),
        radial-gradient(ellipse at 75% 20%, rgba(15,28,17,.9) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 85%, rgba(8,14,9,1) 0%, transparent 55%);
      z-index: 0;
    }

    /* ================================================
       上部固定
    ================================================ */
    .top-fixed {
      position: fixed;
      top: 36px;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      padding: 0 48px;
    }

    /* ================================================
       中央：言葉だけ
    ================================================ */
    .center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      max-width: 680px;
      padding: 0 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
    }

    /* ================================================
       上部ライン
    ================================================ */
    .line-top {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,148,74,.5), transparent);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadein 1.2s .3s forwards;
    }

    /* ================================================
       サイトタイトル
    ================================================ */
    .site-title {
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: .55em;
      color: rgba(90,140,100,.65);
      margin-bottom: 52px;
      opacity: 0;
      animation: fadein 1s .5s forwards;
    }

    /* ================================================
       日付
    ================================================ */
    .date {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(12px, 2.5vw, 15px);
      letter-spacing: .12em;
      color: #6a9e78;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadein 1s .8s forwards;
    }

    /* ================================================
       言葉
    ================================================ */
    .word {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(16px, 3.5vw, 22px);
      line-height: 2.4;
      letter-spacing: .08em;
      color: #dce8de;
      text-align: center;
      opacity: 0;
      animation: fadein 1.2s 1.1s forwards;
    }

    /* ================================================
       下部ライン
    ================================================ */
    .line-bottom {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(184,148,74,.5), transparent);
      margin-top: 52px;
      opacity: 0;
      animation: fadein 1.2s .3s forwards;
    }

    /* ================================================
       ナビ（前／次）— 画面下部固定
    ================================================ */
    .nav {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      opacity: 0;
      animation: fadein 1s 1.4s forwards;
      z-index: 10;
    }

    .nav-btn {
      padding: 10px 32px;
      background: rgba(9,18,12,.7);
      border: 1px solid rgba(61,107,74,.28);
      border-radius: 1px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: .35em;
      color: rgba(106,158,120,.7);
      cursor: pointer;
      transition: all .3s;
      backdrop-filter: blur(8px);
    }
    .nav-btn:hover {
      border-color: rgba(61,107,74,.55);
      color: #a8c9b0;
      background: rgba(61,107,74,.1);
    }

    /* ローディング */
    .loading {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: .4em;
      color: rgba(61,107,74,.6);
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100%{ opacity:.4; } 50%{ opacity:1; }
    }

    @keyframes fadein { to { opacity:1; } }
    @keyframes appear {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .appear { animation: appear .6s ease forwards; }
  </style>
</head>
<body>

<!-- 上部固定 -->
<div class="top-fixed">
  <p class="site-title">深呼吸をする森</p>
  <div class="line-top"></div>
</div>

<!-- 中央：言葉 -->
<div class="center">
  <p class="date" id="date-el">読み込み中…</p>
  <p class="word" id="word-el">
    <span class="loading">🌲</span>
  </p>
</div>

<!-- 下部固定：ナビ -->
<div class="nav" id="nav" style="display:none;">
  <button class="nav-btn" onclick="prevWord()">← 前</button>
  <button class="nav-btn" onclick="nextWord()">次 →</button>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz705lvtEDwpgb9sH1gjLbO9_trSu8XfmcGn5TdWuxpZ7kgKsRF17S6k42YlyKO8CjylQ/exec';
  const SAMPLE  = ['橘川さんの言葉１','橘川さんの言葉２','橘川さんの言葉３'];

  let allWords = [];
  let currentIndex = 0;

  async function fetchWords() {
    if (!GAS_URL) return { allWords: SAMPLE, total: SAMPLE.length };
    try {
      const res  = await fetch(GAS_URL);
      const data = await res.json();
      return { allWords: data.allWords || data.words, total: data.total };
    } catch(e) {
      return { allWords: SAMPLE, total: SAMPLE.length };
    }
  }

  function getTodayIndex(total) {
    const d = new Date();
    const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
    return seed % total;
  }

  function renderWord(index) {
    const word = allWords[index];
    const el = document.getElementById('word-el');
    el.className = 'word';
    const escaped = word.replace(/\n/g, '<br>');
    el.innerHTML = `<span class="appear">${escaped}</span>`;
    document.getElementById('nav').style.display = 'flex';
  }

  function prevWord() {
    currentIndex = (currentIndex - 1 + allWords.length) % allWords.length;
    renderWord(currentIndex);
  }

  function nextWord() {
    currentIndex = (currentIndex + 1) % allWords.length;
    renderWord(currentIndex);
  }

  async function init() {
    const now = new Date();
    document.getElementById('date-el').textContent =
      `${now.getMonth()+1}月${now.getDate()}日`;

    const data   = await fetchWords();
    allWords     = data.allWords;
    currentIndex = getTodayIndex(allWords.length);
    renderWord(currentIndex);
  }

  init();
</script>
</body>
</html>
