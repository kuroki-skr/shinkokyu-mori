<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深呼吸をする森</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500&family=Zen+Antique+Soft&family=Noto+Sans+JP:wght@300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #090f0a;
      --moss:   #3d6b4a;
      --sage:   #6a9e78;
      --mist:   #a8c9b0;
      --dawn:   #e4ede6;
      --gold:   #b8944a;
      --gold-l: #d4ae6e;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      background: var(--bg);
      color: var(--dawn);
      font-family: 'Shippori Mincho', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background:
        radial-gradient(ellipse at 20% 40%, rgba(30,51,32,.5) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 10%, rgba(17,26,18,.7) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 95%, rgba(9,15,10,.9) 0%, transparent 55%);
      pointer-events:none; z-index:0;
    }

    /* 粒子 */
    .particles { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .particle {
      position:absolute; background:var(--gold-l); border-radius:50%; opacity:0;
      animation:float-up var(--dur,10s) var(--del,0s) infinite ease-in-out;
    }
    @keyframes float-up {
      0%  { opacity:0; transform:translateY(100vh) translateX(0); }
      10% { opacity:.5; }
      90% { opacity:.1; }
      100%{ opacity:0; transform:translateY(-5vh) translateX(var(--drift,30px)); }
    }

    /* ================================================
       ページ全体
    ================================================ */
    .page {
      position:relative; z-index:1;
      width:100%; max-width:600px;
      min-height:100vh;
      display:flex; flex-direction:column; align-items:center;
      padding: 52px 24px 60px;
    }

    /* ヘッダー */
    .site-label {
      font-family:'Noto Sans JP',sans-serif;
      font-weight:300; font-size:10px; letter-spacing:.6em;
      color:var(--moss); margin-bottom:10px;
      opacity:0; animation:fadein 1s .2s forwards;
    }

    .site-title {
      font-family:'Zen Antique Soft',serif;
      font-size:clamp(20px,4.5vw,30px); font-weight:400; letter-spacing:.25em;
      color:var(--dawn); text-shadow:0 0 50px rgba(168,201,176,.2);
      opacity:0; animation:fadein 1.2s .4s forwards;
    }

    .rule {
      width:40px; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      margin:18px auto 0;
      opacity:0; animation:fadein 1s .7s forwards;
    }

    /* 日付バッジ */
    .date-badge {
      margin-top:28px;
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(61,107,74,.12);
      border:1px solid rgba(61,107,74,.25);
      border-radius:24px; padding:5px 16px;
      font-family:'Noto Sans JP',sans-serif;
      font-size:11px; font-weight:300; letter-spacing:.25em;
      color:var(--sage);
      opacity:0; animation:fadein 1s 1s forwards;
    }

    /* ================================================
       言葉カード（Web表示用）
    ================================================ */
    .word-card {
      width:100%; margin-top:36px;
      background:rgba(17,26,18,.72);
      border:1px solid rgba(61,107,74,.25);
      border-radius:2px;
      padding:52px 44px 48px;
      position:relative; overflow:hidden;
      opacity:0; animation:fadein 1s 1.2s forwards;
    }

    .word-card::before {
      content:'';
      position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      opacity:.6;
    }

    .card-label {
      font-family:'Noto Sans JP',sans-serif;
      font-size:10px; font-weight:300; letter-spacing:.4em;
      color:var(--moss); margin-bottom:28px;
    }

    .card-word {
      font-size:clamp(18px,4vw,26px);
      line-height:2.2; letter-spacing:.06em;
      color:var(--dawn);
    }

    .card-copy {
      position:absolute; bottom:16px; right:16px;
      background:transparent;
      border:1px solid rgba(61,107,74,.3); border-radius:2px;
      padding:5px 14px;
      font-family:'Noto Sans JP',sans-serif;
      font-size:10px; font-weight:300; letter-spacing:.2em;
      color:var(--moss); cursor:pointer; transition:all .3s;
    }
    .card-copy:hover { border-color:rgba(61,107,74,.6); color:var(--sage); }
    .card-copy.copied { border-color:var(--gold); color:var(--gold-l); }

    /* ================================================
       ナビ（前／次）
    ================================================ */
    .nav {
      display:flex; gap:10px; width:100%; margin-top:14px;
      opacity:0; animation:fadein 1s 1.4s forwards;
    }

    .nav-btn {
      flex:1; padding:12px 0;
      background:transparent;
      border:1px solid rgba(61,107,74,.25); border-radius:2px;
      font-family:'Noto Sans JP',sans-serif;
      font-size:11px; font-weight:300; letter-spacing:.3em;
      color:var(--sage); cursor:pointer; transition:all .3s; text-align:center;
    }
    .nav-btn:hover { background:rgba(61,107,74,.12); border-color:rgba(61,107,74,.5); color:var(--mist); }
    .nav-btn.primary { background:rgba(61,107,74,.2); border-color:rgba(61,107,74,.4); color:var(--mist); }
    .nav-btn.primary:hover { background:rgba(61,107,74,.35); }

    /* ================================================
       画像ダウンロードボタン
    ================================================ */
    .dl-btn {
      margin-top:20px;
      width:100%;
      padding:14px 0;
      background:transparent;
      border:1px solid rgba(184,148,74,.35); border-radius:2px;
      font-family:'Noto Sans JP',sans-serif;
      font-size:11px; font-weight:300; letter-spacing:.4em;
      color:var(--gold-l); cursor:pointer; transition:all .3s;
      opacity:0; animation:fadein 1s 1.6s forwards;
    }
    .dl-btn:hover { background:rgba(184,148,74,.1); border-color:rgba(184,148,74,.6); }

    /* 隠しCanvas */
    #img-canvas { display:none; }

    /* ================================================
       フッター
    ================================================ */
    footer {
      margin-top:auto; padding-top:48px;
      text-align:center;
    }
    .footer-text {
      font-family:'Noto Sans JP',sans-serif;
      font-size:10px; font-weight:300; letter-spacing:.3em;
      color:rgba(106,158,120,.35); line-height:2.2;
    }

    /* ローディング */
    .loading-wrap {
      display:flex; flex-direction:column; align-items:center; gap:18px;
      padding:60px 0;
    }
    .loading-icon { font-size:34px; animation:breathe 3.5s ease-in-out infinite; }
    @keyframes breathe {
      0%,100%{ transform:scale(1); opacity:.5; }
      50%    { transform:scale(1.06); opacity:1; }
    }
    .loading-text {
      font-family:'Noto Sans JP',sans-serif;
      font-size:11px; font-weight:300; letter-spacing:.4em; color:var(--moss);
    }

    @keyframes fadein { to { opacity:1; } }
    @keyframes appear {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .appear { animation:appear .55s ease forwards; }

    @media(max-width:480px){
      .page { padding:36px 18px 48px; }
      .word-card { padding:36px 24px 44px; }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="page">

  <p class="site-label">橘川幸夫の言葉</p>
  <h1 class="site-title">深呼吸をする森</h1>
  <div class="rule"></div>

  <div class="date-badge" id="date-badge">🌿 読み込み中…</div>

  <!-- 言葉カード -->
  <div class="word-card" id="word-card">
    <div class="loading-wrap">
      <div class="loading-icon">🌲</div>
      <p class="loading-text">言葉を集めています…</p>
    </div>
  </div>

  <!-- 前後ナビ -->
  <div class="nav" id="nav" style="display:none;">
    <button class="nav-btn" onclick="prevWord()">← 前の言葉</button>
    <button class="nav-btn primary" onclick="nextWord()">次の言葉 →</button>
  </div>

  <!-- 画像DLボタン -->
  <button class="dl-btn" id="dl-btn" style="display:none;" onclick="downloadImage()">
    🖼 画像として保存する
  </button>

  <!-- 隠しCanvas（画像生成用） -->
  <canvas id="img-canvas"></canvas>

  <footer>
    <p class="footer-text" id="footer-text">
      深呼吸をして、あなたの森を歩いてください
    </p>
  </footer>

</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbz705lvtEDwpgb9sH1gjLbO9_trSu8XfmcGn5TdWuxpZ7kgKsRF17S6k42YlyKO8CjylQ/exec';
  const SAMPLE  = ['橘川さんの言葉１','橘川さんの言葉２','橘川さんの言葉３','橘川さんの言葉４','橘川さんの言葉５'];

  let allWords = [];
  let totalCount = 0;
  let currentIndex = 0;

  // ================================================
  // データ取得
  // ================================================
  async function fetchWords() {
    if (!GAS_URL) return { allWords: SAMPLE, total: SAMPLE.length };
    try {
      const res  = await fetch(GAS_URL);
      const data = await res.json();
      return { allWords: data.allWords || data.words, total: data.total };
    } catch(e) {
      return { allWords: SAMPLE, total: SAMPLE.length };
    }
  }

  // 日付シード：同じ日は同じ言葉
  function getTodayIndex(total) {
    const d = new Date();
    const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
    return seed % total;
  }

  // ================================================
  // 描画
  // ================================================
  function renderWord(index) {
    const word = allWords[index];
    const card = document.getElementById('word-card');
    card.innerHTML = `
      <div class="card-label">— 今日の言葉</div>
      <p class="card-word appear">${word}</p>
      <button class="card-copy" id="copy-btn" onclick="copyWord()">コピー</button>
    `;
    document.getElementById('nav').style.display = 'flex';
    document.getElementById('dl-btn').style.display = 'block';

    // フッター更新
    document.getElementById('footer-text').innerHTML =
      `${totalCount.toLocaleString()}の言葉の森から<br>深呼吸をして、あなたの言葉を見つけてください`;
  }

  function prevWord() {
    currentIndex = (currentIndex - 1 + allWords.length) % allWords.length;
    renderWord(currentIndex);
  }

  function nextWord() {
    currentIndex = (currentIndex + 1) % allWords.length;
    renderWord(currentIndex);
  }

  function copyWord() {
    navigator.clipboard.writeText(allWords[currentIndex]).then(() => {
      const btn = document.getElementById('copy-btn');
      if (!btn) return;
      btn.textContent = '✓ コピー済';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ================================================
  // 画像生成・ダウンロード
  // ================================================
  function downloadImage() {
    const word  = allWords[currentIndex];
    const now   = new Date();
    const month = now.getMonth() + 1;
    const day   = now.getDate();
    const dateStr = `${month}月${day}日`;

    // スマホ縦長サイズ
    const W = 1080, H = 1920;
    const canvas = document.getElementById('img-canvas');
    canvas.width  = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    // 背景
    const bg = ctx.createRadialGradient(W*0.2, H*0.4, 0, W*0.2, H*0.4, W*0.9);
    bg.addColorStop(0, '#1a2e1c');
    bg.addColorStop(0.5, '#111a12');
    bg.addColorStop(1, '#090f0a');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // 上部ゴールドライン
    const lineGrad = ctx.createLinearGradient(0, 0, W, 0);
    lineGrad.addColorStop(0, 'transparent');
    lineGrad.addColorStop(0.5, '#b8944a');
    lineGrad.addColorStop(1, 'transparent');
    ctx.strokeStyle = lineGrad;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(W * 0.15, H * 0.18);
    ctx.lineTo(W * 0.85, H * 0.18);
    ctx.stroke();

    // 下部ゴールドライン
    ctx.beginPath();
    ctx.moveTo(W * 0.15, H * 0.82);
    ctx.lineTo(W * 0.85, H * 0.82);
    ctx.stroke();

    // サイトタイトル（小）
    ctx.fillStyle = 'rgba(61,107,74,0.7)';
    ctx.font = `300 ${W * 0.028}px "Noto Sans JP", sans-serif`;
    ctx.textAlign = 'center';
    ctx.letterSpacing = `${W * 0.008}px`;
    ctx.fillText('深呼吸をする森', W / 2, H * 0.145);

    // 日付
    ctx.fillStyle = '#6a9e78';
    ctx.font = `400 ${W * 0.048}px "Shippori Mincho", serif`;
    ctx.fillText(dateStr, W / 2, H * 0.28);

    // 言葉本文（改行対応・中央）
    ctx.fillStyle = '#e4ede6';
    const fontSize = W * 0.072;
    ctx.font = `400 ${fontSize}px "Shippori Mincho", serif`;

    // 長い言葉は自動折り返し
    const maxWidth = W * 0.68;
    const lineH    = fontSize * 2.0;
    const lines    = wrapText(ctx, word, maxWidth);
    const totalTextH = lines.length * lineH;
    const startY  = H / 2 - totalTextH / 2 + fontSize * 0.4;

    lines.forEach((line, i) => {
      ctx.fillText(line, W / 2, startY + i * lineH);
    });

    // ダウンロード
    const link = document.createElement('a');
    link.download = `shinkokyuu_${month}${day}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  // テキスト折り返しヘルパー
  function wrapText(ctx, text, maxWidth) {
    // まず改行文字で分割
    const rawLines = text.split(/[\n\r]/);
    const result = [];
    rawLines.forEach(raw => {
      if (ctx.measureText(raw).width <= maxWidth) {
        result.push(raw);
      } else {
        // 文字単位で折り返し
        let current = '';
        for (const ch of raw) {
          if (ctx.measureText(current + ch).width > maxWidth) {
            if (current) result.push(current);
            current = ch;
          } else {
            current += ch;
          }
        }
        if (current) result.push(current);
      }
    });
    return result;
  }

  // ================================================
  // 粒子
  // ================================================
  function createParticles() {
    const c = document.getElementById('particles');
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const s = 1 + Math.random() * 2;
      p.style.cssText = `left:${Math.random()*100}%;width:${s}px;height:${s}px;`;
      p.style.setProperty('--dur',  `${7+Math.random()*10}s`);
      p.style.setProperty('--del',  `${Math.random()*10}s`);
      p.style.setProperty('--drift',`${(Math.random()-.5)*60}px`);
      c.appendChild(p);
    }
  }

  // ================================================
  // 初期化
  // ================================================
  async function init() {
    const now = new Date();
    document.getElementById('date-badge').textContent =
      `🌿 ${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

    const data  = await fetchWords();
    allWords    = data.allWords;
    totalCount  = data.total;
    currentIndex = getTodayIndex(allWords.length);

    renderWord(currentIndex);
  }

  createParticles();
  init();
</script>
</body>
</html>
